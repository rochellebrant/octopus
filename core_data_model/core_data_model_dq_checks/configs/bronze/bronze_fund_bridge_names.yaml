table_name: bronze_fund_bridge_names

roles:
  primary_keys: [fund_br_names_id]
  system_keys: [fund_name_id, fund_alt_name, START_AT]
  system_start_at: START_AT
  system_end_at: END_AT

checks:
  # table-specific checks (in addition to defaults)

  - template: is_not_null
    name: required_fields_is_not_null_hard_check
    criticality: error
    params:
      columns:
        - fund_alt_name




  - template: fk_exists
    name: fund_name_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_name_id]
      ref_table: bronze_fund_dim_names
      ref_columns: [fund_name_id]




  - template: string_pattern_match
    name: fund_br_names_id_string_pattern
    criticality: error
    params:
      columns: fund_br_names_id
      pattern: "^FUND_BR_NAMES_\\d{4}$"  # Double backslash for YAML escaping

  - template: string_pattern_match
    name: fund_name_id_string_pattern
    criticality: error
    params:
      columns: fund_name_id
      pattern: "^FUND_NAME_ID_\\d{4}$"  # Double backslash for YAML escaping