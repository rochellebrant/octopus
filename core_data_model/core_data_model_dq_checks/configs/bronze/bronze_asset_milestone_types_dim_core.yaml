table_name: bronze_asset_milestone_types_dim_core

roles:
  primary_keys: [milestone_type_id, START_AT]
  system_keys: [milestone_type_id, START_AT]
  system_start_at: START_AT
  system_end_at: END_AT

checks:
  # table-specific checks (in addition to defaults)

  - template: is_not_null
    name: required_fields_is_not_null_hard_check
    criticality: error
    params:
      columns:
        - milestone_type
        - viewing_order


  - template: string_pattern_match
    name: milestone_type_id_string_pattern
    criticality: error
    params:
      columns: milestone_type_id
      pattern: "^MILE_TYPE_\\d{4}$"  # Double backslash for YAML escaping