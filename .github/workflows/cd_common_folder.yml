name: XIO Common Folder CD Pipeline

on:
  pull_request:
    branches:
      - main 
    paths:
      - common/**

concurrency:
  group: databricks-prod-workspace
  cancel-in-progress: false

env:
  DATABRICKS_HOST: ${{ secrets.XIO_DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{secrets.XIO_DATABRICKS_CLIENT_ID}}
  DATABRICKS_CLIENT_SECRET: ${{secrets.XIO_DATABRICKS_CLIENT_SECRET}}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          clean: true

      - name: Show changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }} HEAD

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nutter "black[jupyter]"

      - name: Check code formatting with Black
        run: |
          black common/ || echo "Black check failed, but continuing"

      - name: Replace ENVIRONMENT value with 'production'
        run: |
          sed -i "s/ENVIRONMENT = \"_dev\"/ENVIRONMENT = \"\" # Blank string indicates prod env./" common/environment.py

      - name: Check file content after sed
        run: cat common/environment.py

      - name: Extract PR metadata
        run: |
          echo "PR_ID=$(jq -r .pull_request.number "$GITHUB_EVENT_PATH")" >> $GITHUB_ENV
 
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate, deploy in prod (with retry)
        run: |
          set -euo pipefail
          cd common
          pwd

          databricks bundle validate -t prod

          # Retry loop: up to 6 attempts with backoff
          n=0
          until databricks bundle deploy -t prod --auto-approve --var="pr_id=${PR_ID}"; do
            exit_code=$?
            n=$((n+1))
            if [ $n -ge 6 ]; then
              echo "Databricks deploy failed after $n attempts (last exit code: $exit_code)."
              exit $exit_code
            fi
            echo "Deploy failed (exit $exit_code). Likely lock contention. Retrying in $((10 * n))s (attempt #$n)..."
            sleep $((10 * n))
          done
