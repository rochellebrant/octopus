name: XIO eFront CD Pipeline

on:
  push:
    branches:
      - main 
    paths:
      - efront_pipeline/**

# Ensures only one Databricks deploy runs at a time for this workspace - resolves concurrency error
concurrency:
  group: databricks-prod-workspace
  cancel-in-progress: false  # For prod, usually better to queue than cancel the older run
  
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          clean: true
          fetch-depth: 0

      - name: Show changed files
        run: |
          git diff --name-only HEAD^ HEAD

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nutter black

      - name: Extract PR metadata (Push Safe)
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | sed 's/#//')
          
          # Default to "0" if no PR number found (e.g. direct push)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="0"
          fi
          
          echo "Extracted PR ID: $PR_NUMBER"
          echo "PR_ID=$PR_NUMBER" >> $GITHUB_ENV
 
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Replace DEVELOPMENT_PREFIX with 'production'
        run: |
          sed -i "s/DEVELOPMENT_PREFIX *= *['\"]dev_['\"]/DEVELOPMENT_PREFIX = 'production'/" efront_pipeline/pipeline_parameters.py

      - name: Validate, deploy in prod (with retry)
        run: |
          set -euo pipefail
          cd efront_pipeline
          pwd

          databricks bundle validate -t prod

          # Retry loop: up to 6 attempts with backoff
          n=0
          until databricks bundle deploy -t prod --auto-approve --var="pr_id=${PR_ID}"; do
            exit_code=$?
            n=$((n+1))
            if [ $n -ge 6 ]; then
              echo "Databricks deploy failed after $n attempts (last exit code: $exit_code)."
              exit $exit_code
            fi
            echo "Deploy failed (exit $exit_code). Retrying in $((10 * n))s (attempt #$n)..."
            sleep $((10 * n))
          done
        env:
          DATABRICKS_HOST: ${{ secrets.XIO_DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{secrets.XIO_DATABRICKS_CLIENT_ID}}
          DATABRICKS_CLIENT_SECRET: ${{secrets.XIO_DATABRICKS_CLIENT_SECRET}}

      - name: Add Deployment Summary
        if: success()
        run: |
          echo "### 🚀 Databricks Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "The eFront pipeline has been deployed to **Production**." >> $GITHUB_STEP_SUMMARY
          echo "✅ **PR ID Used:** ${PR_ID}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check your Databricks Workspace for the updated Job/Pipeline." >> $GITHUB_STEP_SUMMARY
