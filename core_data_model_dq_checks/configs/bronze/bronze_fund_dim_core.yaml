table_name: bronze_fund_dim_core

roles:
  primary_keys: [fund_core_id, START_AT]
  system_keys: [fund_core_id, START_AT]
  system_start_at: START_AT
  system_end_at: END_AT
  business_keys: [fund_core_id, fund_start_date]
  business_start_at: fund_start_date
  business_end_at: fund_end_date
  
checks:
  # table-specific checks (in addition to defaults)

  - template: is_not_null
    name: required_fields_is_not_null_hard_check
    criticality: error
    params:
      columns:
        - company_core_id
        - primary_fund_name_id

  - template: is_not_null
    name: required_fields_is_not_null_soft_check
    criticality: warn
    params:
      columns:
        - base_currency
        - fund_type_id
        - fund_client_type_id
        - fund_structure_type_id
        - fund_investment_type_id
        - fund_legal_type_id
        - fund_lifecycle_id



  - template: no_future_timestamps
    name: fund_timestamps_not_future
    criticality: warn
    params:
      columns:
        - fund_start_date
        - fund_end_date
  



  - template: is_in_range
    name: fund_active_dates_reasonable
    criticality: warn
    params:
      columns:
        - fund_start_date
        - fund_end_date
      min_limit: "1990-01-01"
      max_limit: "2100-01-01"



  - template: fk_exists
    name: company_core_id_fk_exists
    criticality: error
    params:
      fk_columns: [company_core_id]
      ref_table: bronze_company_dim_core
      ref_columns: [company_core_id]
  
  - template: fk_exists
    name: primary_fund_name_id_fk_exists
    criticality: error
    params:
      fk_columns: [primary_fund_name_id]
      ref_table: bronze_fund_dim_names
      ref_columns: [fund_name_id]

  - template: fk_exists
    name: fund_type_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_type_id]
      ref_table: bronze_fund_dim_type
      ref_columns: [fund_type_id]

  - template: fk_exists
    name: fund_client_type_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_client_type_id]
      ref_table: bronze_fund_dim_client_type
      ref_columns: [fund_client_type_id]

  - template: fk_exists
    name: fund_structure_type_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_structure_type_id]
      ref_table: bronze_fund_dim_structure_type
      ref_columns: [fund_structure_type_id]

  - template: fk_exists
    name: fund_investment_type_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_investment_type_id]
      ref_table: bronze_fund_dim_investment_type
      ref_columns: [fund_investment_type_id]

  - template: fk_exists
    name: fund_legal_type_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_legal_type_id]
      ref_table: bronze_fund_dim_legal_type
      ref_columns: [fund_legal_type_id]

  - template: fk_exists
    name: fund_lifecycle_id_fk_exists
    criticality: error
    params:
      fk_columns: [fund_lifecycle_id]
      ref_table: bronze_fund_dim_lifecycle
      ref_columns: [fund_lifecycle_id]



  - template: string_pattern_match
    name: fund_core_id_string_pattern
    criticality: error
    params:
      columns: fund_core_id
      pattern: "^FUND_\\d{4}$"  # Double backslash for YAML escaping