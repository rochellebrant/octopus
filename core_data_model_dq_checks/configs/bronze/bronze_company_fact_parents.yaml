table_name: bronze_company_fact_parents

roles:
  primary_keys: [company_bridge_parent_id]
  system_keys: [company_bridge_parent_id, company_core_id, parent_company_id, START_AT]
  system_start_at: START_AT
  system_end_at: END_AT
  business_keys: [company_core_id, parent_company_id, active_from_date]
  business_start_at: active_from_date
  business_end_at: active_to_date
  
checks:
  # table-specific checks (in addition to defaults)

  - template: is_not_null
    name: required_fields_is_not_null_hard_check
    criticality: error
    params:
      columns:
        - ownership_percentage




  - template: fk_exists
    name: company_core_id_fk_exists
    criticality: error
    params:
      fk_columns: [company_core_id]
      ref_table: bronze_company_dim_core
      ref_columns: [company_core_id]
  
  - template: fk_exists
    name: parent_company_id_fk_exists
    criticality: error
    params:
      fk_columns: [parent_company_id]
      ref_table: bronze_company_dim_core
      ref_columns: [company_core_id]




  - template: string_pattern_match
    name: company_bridge_parent_id_string_pattern
    criticality: error
    params:
      columns: company_bridge_parent_id
      pattern: "^COMP_BR_PRNT_\\d{4}$"  # Double backslash for YAML escaping