table_name: bronze_mapping_company

roles:
  primary_keys: [source_system_id, source_company_name, source_company_id, cdm_company_id]

checks:
  # table-specific checks (in addition to defaults)

  - template: fk_exists
    name: cdm_company_id_fk_exists
    criticality: warn
    params:
      fk_columns: ["cdm_company_id"]
      ref_table: bronze_company_dim_core
      ref_columns: ["company_core_id"]

  - template: fk_exists
    name: source_system_id_fk_exists
    criticality: error
    params:
      fk_columns: [source_system_id]
      ref_table: bronze_mapping_system_sources
      ref_columns: [source_system_id]