bundle:
  name: xio-common-functions

include:
  - ../databricks_resources/notifications.yaml
  - ../databricks_resources/tags_and_vars.yaml
  - ../databricks_resources/targets.yaml
  - ../databricks_resources/permissions.yaml

variables:
  ENV:
    default: ''
  common_path:
    description: Path to the common functions/libraries directory
    default: '/Workspace/XIO/PROD/xio-common-functions/files/libraries'
  pr_number:
    description: 'PR number to isolate workspace paths and job names'
    default: 'staging'

targets:
  # A dedicated PR target. 
  # (existing 'staging' target is safely kept in targets.yaml)
  pr:
    workspace:
      # Dynamically creates a unique Terraform state and directory for every PR
      root_path: /Shared/.bundle/${bundle.name}/pr-${var.pr_number}

resources:
  jobs:
    xio_unit_test_functions:
      # Kept your original naming convention!
      name: xio_unit_test_functions_${bundle.target}_${var.pr_number}

      environments:
        - environment_key: serverless_testing_env
          spec:
            client: "1"
            dependencies:
              - pytest
              - PyYAML
              - databricks-sdk
              - databricks-labs-dqx==0.9.3
              - protobuf==4.25.3

      tasks:
        - task_key: run_tests
          description: Run entry table function tests
          environment_key: serverless_testing_env
          spark_python_task:
            python_file: ./tests/run_tests.py

      email_notifications:
        on_failure: ${var.notification_emails}
      permissions: ${var.default_job_permissions}
