bundle:
  name: xio-efront

xio_common_tags: &xio_common_tags
  type: efront
  team: XIO
  bundle_target: ${bundle.target}
  pr_id: ${var.pr_id}

variables:
  pr_id:
    description: GitHub pull request number (set by CI)
    default: 'none'
  ENV:
    description: 'Environment variable used across notebooks + DLT (DEV in dev/staging, empty in prod)'
    default: 'DEV'

targets:
  dev:
    mode: development
    workspace:
      host: https://octoenergy-oegen-prod.cloud.databricks.com/
    variables:
      ENV: 'DEV'
    resources:
      jobs:
        xio_efront_scheduled:
          schedule: null
        xio_efront_manual:
          schedule: null

  staging:
    mode: production
    workspace:
      host: https://octoenergy-oegen-prod.cloud.databricks.com/
      root_path: /XIO/DEV/${bundle.name}
    variables:
      ENV: 'DEV'
    resources:
      jobs:
        xio_efront_scheduled:
          schedule:
            quartz_cron_expression: '0 20 7 ? * SUN'
            timezone_id: UTC
            pause_status: UNPAUSED
        xio_efront_manual:
          schedule: null

  prod:
    mode: production
    workspace:
      host: https://octoenergy-oegen-prod.cloud.databricks.com/
      root_path: /XIO/PROD/${bundle.name}
    variables:
      ENV: ''
    resources:
        jobs:
          xio_efront_scheduled:
            schedule:
              quartz_cron_expression: '0 0 7 ? * MON-FRI'
              timezone_id: UTC
              pause_status: UNPAUSED
          xio_efront_manual:
            schedule: null

resources:
  jobs:
    xio_efront_scheduled:
      name: xio_efront_scheduled
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      max_concurrent_runs: 1

      tasks:
        - task_key: api_ingestion_scheduled
          notebook_task:
            notebook_path: ./ingestion/api_ingestion_load.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "api_ingestion_parameters_scheduled"

        - task_key: union_historics_and_api_ingested
          depends_on:
                - task_key: api_ingestion_scheduled
          notebook_task:
            notebook_path: ./efront_specific/unify_tables.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "union_parameters_scheduled"

        - task_key: cdm_checker
          depends_on:
              - task_key: bronze_dlt
          notebook_task:
            notebook_path: ./cdm_checker/cdm_checker_code.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}

        - task_key: bronze_dlt
          depends_on:
            - task_key: union_historics_and_api_ingested
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_pipeline_scheduled.id}
            full_refresh: true

        - task_key: silver_entry
          depends_on:
            - task_key: bronze_dlt
          notebook_task:
            notebook_path: ./silver_layer/silver_models/silver_entry.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "silver_model_parameters_scheduled"

        - task_key: silver_dlt
          depends_on:
            - task_key: silver_entry
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline_scheduled.id}
            full_refresh: true

        - task_key: gold_entry
          depends_on:
            - task_key: silver_dlt
          notebook_task:
            notebook_path: ./gold_layer/gold_models/gold_entry.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "gold_model_parameters_scheduled"

      tags: *xio_common_tags


    xio_efront_manual:
      name: xio_efront_manual
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      max_concurrent_runs: 1

      tasks:
        - task_key: api_ingestion_manual
          notebook_task:
            notebook_path: ./ingestion/api_ingestion_load.ipynb
            base_parameters:
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "api_ingestion_parameters_manual"

        - task_key: union_historics_and_api_ingested
          depends_on:
                - task_key: api_ingestion_manual
          notebook_task:
            notebook_path: ./efront_specific/unify_tables.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "union_parameters_scheduled"

        - task_key: cdm_checker
          depends_on:
              - task_key: bronze_dlt
          notebook_task:
            notebook_path: ./cdm_checker/cdm_checker_code.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}

        - task_key: bronze_dlt
          depends_on:
            - task_key: union_historics_and_api_ingested
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_pipeline_manual.id}
            full_refresh: true

        - task_key: silver_entry
          depends_on:
            - task_key: bronze_dlt
          notebook_task:
            notebook_path: ./silver_layer/silver_models/silver_entry.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "silver_model_parameters_manual"

        - task_key: silver_dlt
          depends_on:
            - task_key: silver_entry
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline_manual.id}
            full_refresh: true

        - task_key: gold_entry
          depends_on:
            - task_key: silver_dlt
          notebook_task:
            notebook_path: ./gold_layer/gold_models/gold_entry.ipynb
            base_parameters:
              BUNDLE_ENV: ${var.ENV}
              BUNDLE_TARGET: ${bundle.target}
              PARAMETER_MODULE: "gold_model_parameters_manual"

      tags: *xio_common_tags

  

  pipelines:
    bronze_pipeline_scheduled:
      name: xio_efront_bronze_scheduled_pipeline_${bundle.target}
      catalog: oegen_data_prod_source
      schema: src_blackrock_efront_xio
      serverless: true
      configuration:
        spark.xio.bundle_env: ${var.ENV}
        spark.xio.bundle_target: ${bundle.target}
        xio.parameter_module: "bronze_table_parameters_scheduled"
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      continuous: false
      edition: advanced
      libraries:
        - notebook: 
            path: ./bronze_layer/bronze_dlt_load.py ###### .ipynb doesn't work

    bronze_pipeline_manual:
      name: xio_efront_bronze_manual_pipeline_${bundle.target}
      catalog: oegen_data_prod_source
      schema: src_blackrock_efront_xio
      serverless: true
      configuration:
        spark.xio.bundle_env: ${var.ENV}
        spark.xio.bundle_target: ${bundle.target}
        xio.parameter_module: "bronze_table_parameters_manual"
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      continuous: false
      edition: advanced
      libraries:
        - notebook: 
            path: ./bronze_layer/bronze_dlt_load.py ###### .ipynb doesn't work


    silver_pipeline_scheduled:
      name: xio_efront_silver_scheduled_pipeline_${bundle.target}
      catalog: oegen_data_prod_prod
      schema: efront
      serverless: true
      configuration:
        spark.xio.bundle_env: ${var.ENV}
        spark.xio.bundle_target: ${bundle.target}
        xio.parameter_module: "silver_table_parameters_scheduled"
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      continuous: false
      edition: advanced
      libraries:
        - notebook:
            path: ./silver_layer/silver_dlt_load.py ###### .ipynb doesn't work

    silver_pipeline_manual:
      name: xio_efront_silver_manual_pipeline_${bundle.target}
      catalog: oegen_data_prod_prod
      schema: efront
      serverless: true
      configuration:
        spark.xio.bundle_env: ${var.ENV}
        spark.xio.bundle_target: ${bundle.target}
        xio.parameter_module: "silver_table_parameters_manual"
      permissions:
        - group_name: 'Sennen XIO Project'
          level: CAN_MANAGE
      continuous: false
      edition: advanced
      libraries:
        - notebook:
            path: ./silver_layer/silver_dlt_load.py ###### .ipynb doesn't work